<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Key Manager</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --border-hi: #3b3b5e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --accent: #7c6af7;
    --danger: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  /* Auth gate */
  #auth-gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
  }

  .auth-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px;
  }

  .auth-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 0.4rem; }
  .auth-card p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }

  label { display: block; font-size: 11px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

  input[type="password"], input[type="text"], input[type="number"], select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-family: var(--mono); font-size: 13px; outline: none;
    transition: border-color 0.2s; margin-bottom: 1rem;
  }

  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--bg); }

  .btn {
    border-radius: 8px; padding: 10px 18px; font-family: var(--sans);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none;
  }

  .btn-primary { background: var(--accent); color: white; width: 100%; padding: 12px; }
  .btn-primary:hover { background: #6b5be0; }

  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-muted { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-muted:hover { color: var(--text); }

  #admin-panel { display: none; }

  /* Top nav */
  .topbar {
    background: rgba(10,10,15,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

  .admin-badge {
    background: rgba(124,106,247,0.15); color: var(--accent);
    font-size: 10px; font-family: var(--mono); letter-spacing: 0.08em;
    padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(124,106,247,0.3);
  }

  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .logout-link { cursor: pointer; color: var(--muted); }
  .logout-link:hover { color: var(--danger); }

  /* Layout */
  .layout { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 56px); }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    background: var(--surface);
  }

  .sidebar h3 { font-size: 12px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }

  .gen-form { display: flex; flex-direction: column; gap: 0; }

  .field { margin-bottom: 1rem; }
  .field label { margin-bottom: 6px; }
  .field input, .field select { margin-bottom: 0; }

  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1.5rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .stat-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px;
  }

  .stat-label { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-value.green { color: var(--success); }
  .stat-value.red { color: var(--danger); }

  /* Table */
  .content-area { padding: 1.5rem; overflow-x: auto; }

  .content-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem; flex-wrap: wrap; gap: 12px;
  }

  .content-header h2 { font-size: 16px; font-weight: 600; }

  .filter-row { display: flex; gap: 8px; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px;
    font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: var(--mono);
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.08); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  th {
    text-align: left; padding: 10px 12px;
    font-size: 11px; color: var(--muted); font-family: var(--mono);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle; font-family: var(--mono); font-size: 12px;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .key-cell { color: var(--accent); letter-spacing: 0.04em; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px;
    font-size: 11px; font-family: var(--mono); letter-spacing: 0.04em;
  }

  .status-pill.active { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
  .status-pill.revoked { background: rgba(239,68,68,0.08); color: var(--danger); border: 1px solid rgba(239,68,68,0.15); }
  .status-pill.expired { background: rgba(245,158,11,0.08); color: var(--warning); border: 1px solid rgba(245,158,11,0.15); }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .actions { display: flex; gap: 6px; }

  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    font-size: 13px; font-family: var(--mono);
    z-index: 200; animation: slideIn 0.2s ease;
    display: none;
  }

  @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

  .new-key-banner {
    background: rgba(124,106,247,0.08); border: 1px solid rgba(124,106,247,0.25);
    border-radius: 10px; padding: 12px 14px;
    font-family: var(--mono); font-size: 12px; color: var(--accent);
    margin-top: 1rem; display: none; word-break: break-all; line-height: 1.8;
  }

  .copy-key { cursor: pointer; text-decoration: underline; color: var(--text); }
</style>
</head>
<body>

<!-- Auth Gate -->
<div id="auth-gate">
  <div class="auth-card">
    <h2>Admin Login</h2>
    <p>Enter your admin secret to manage keys.</p>
    <label>Admin Secret</label>
    <input type="password" id="admin-secret-input" placeholder="Enter secret..." onkeydown="if(event.key==='Enter') adminLogin()">
    <button class="btn btn-primary" onclick="adminLogin()">Login to Admin</button>
    <div id="auth-error" style="color:var(--danger);font-size:12px;margin-top:8px;font-family:var(--mono);display:none;">Invalid secret.</div>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-panel">
  <div class="topbar">
    <div class="topbar-title">
      Key Manager
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <span id="key-count-nav">— keys</span>
      <span class="logout-link" onclick="adminLogout()">Logout</span>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar: Generate -->
    <div class="sidebar">
      <h3>Generate New Key</h3>
      <div class="gen-form">
        <div class="field">
          <label>User / Label</label>
          <input type="text" id="gen-label" placeholder="e.g. Rahul">
        </div>
        <div class="field">
          <label>Expiry</label>
          <select id="gen-expiry">
            <option value="0">Never expires</option>
            <option value="1">1 Day</option>
            <option value="7">7 Days</option>
            <option value="30" selected>30 Days</option>
            <option value="90">90 Days</option>
            <option value="365">1 Year</option>
          </select>
        </div>
        <div class="field">
          <label>Key Prefix</label>
          <input type="text" id="gen-prefix" placeholder="SK" maxlength="6">
        </div>
        <button class="btn btn-primary" onclick="generateKey()">Generate Key</button>
      </div>

      <div class="new-key-banner" id="new-key-banner">
        <div style="color:var(--muted);font-size:10px;margin-bottom:4px;letter-spacing:0.06em;">NEW KEY GENERATED</div>
        <span id="new-key-value"></span><br>
        <span class="copy-key" onclick="copyKey()">Copy key ↗</span>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-label">Total</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Active</div>
          <div class="stat-value green" id="stat-active">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Revoked</div>
          <div class="stat-value red" id="stat-revoked">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Expired</div>
          <div class="stat-value" style="color:var(--warning)" id="stat-expired">0</div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="content-area">
      <div class="content-header">
        <h2>All Keys</h2>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
          <button class="filter-btn" onclick="setFilter('revoked', this)">Revoked</button>
          <button class="filter-btn" onclick="setFilter('expired', this)">Expired</button>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Label</th>
            <th>Status</th>
            <th>Created</th>
            <th>Expires</th>
            <th>Uses</th>
            <th>Last Used</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="keys-tbody">
          <tr><td colspan="8" style="color:var(--muted);text-align:center;padding:2rem;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let adminSecret = '';
  let allKeys = [];
  let currentFilter = 'all';

  function adminLogin() {
    const val = document.getElementById('admin-secret-input').value.trim();
    if (!val) return;
    adminSecret = val;
    loadKeys().then(ok => {
      if (ok) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
      } else {
        document.getElementById('auth-error').style.display = 'block';
        adminSecret = '';
      }
    });
  }

  function adminLogout() {
    adminSecret = '';
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('admin-secret-input').value = '';
  }

  async function loadKeys() {
    try {
      const res = await fetch('/api/admin/keys', { headers: { 'x-admin-secret': adminSecret } });
      if (!res.ok) return false;
      const data = await res.json();
      allKeys = data.keys;
      renderTable();
      updateStats();
      return true;
    } catch { return false; }
  }

  function getStatus(k) {
    if (!k.active) return 'revoked';
    if (k.is_expired) return 'expired';
    return 'active';
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('keys-tbody');
    const keys = allKeys.filter(k => currentFilter === 'all' || getStatus(k) === currentFilter);

    if (!keys.length) {
      tbody.innerHTML = `<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:2rem;">No keys found</td></tr>`;
      return;
    }

    tbody.innerHTML = keys.map(k => {
      const status = getStatus(k);
      const created = new Date(k.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      const expires = k.expires_at ? new Date(k.expires_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
      const lastUsed = k.last_used ? new Date(k.last_used).toLocaleDateString('en-IN', { day:'numeric', month:'short' }) : 'Never';

      const revokeBtn = status === 'active'
        ? `<button class="btn btn-sm btn-danger" onclick="revokeKey('${k.key}')">Revoke</button>`
        : '';
      const deleteBtn = `<button class="btn btn-sm btn-muted" onclick="deleteKey('${k.key}')">Delete</button>`;

      return `
        <tr>
          <td class="key-cell">${k.key}</td>
          <td>${k.label || '—'}</td>
          <td><span class="status-pill ${status}"><span class="dot"></span>${status}</span></td>
          <td>${created}</td>
          <td>${expires}</td>
          <td>${k.use_count || 0}</td>
          <td>${lastUsed}</td>
          <td><div class="actions">${revokeBtn}${deleteBtn}</div></td>
        </tr>
      `;
    }).join('');

    document.getElementById('key-count-nav').textContent = `${keys.length} key${keys.length !== 1 ? 's' : ''}`;
  }

  function updateStats() {
    const total = allKeys.length;
    const active = allKeys.filter(k => getStatus(k) === 'active').length;
    const revoked = allKeys.filter(k => k.active === false).length;
    const expired = allKeys.filter(k => k.is_expired && k.active).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-revoked').textContent = revoked;
    document.getElementById('stat-expired').textContent = expired;
  }

  async function generateKey() {
    const label = document.getElementById('gen-label').value.trim();
    const expires_days = document.getElementById('gen-expiry').value;
    const prefix = document.getElementById('gen-prefix').value.trim() || 'SK';

    const res = await fetch('/api/admin/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
      body: JSON.stringify({ label, expires_days, prefix })
    });

    const data = await res.json();
    if (data.success) {
      document.getElementById('new-key-value').textContent = data.key;
      document.getElementById('new-key-banner').style.display = 'block';
      showToast('Key generated');
      loadKeys();
    }
  }

  function copyKey() {
    const key = document.getElementById('new-key-value').textContent;
    navigator.clipboard.writeText(key).then(() => showToast('Copied!'));
  }

  async function revokeKey(key) {
    if (!confirm(`Revoke key: ${key}?`)) return;
    const res = await fetch('/api/admin/revoke', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
      body: JSON.stringify({ key })
    });
    const data = await res.json();
    if (data.success) { showToast('Key revoked'); loadKeys(); }
  }

  async function deleteKey(key) {
    if (!confirm(`Permanently delete key: ${key}?`)) return;
    const res = await fetch('/api/admin/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-secret': adminSecret },
      body: JSON.stringify({ key })
    });
    const data = await res.json();
    if (data.success) { showToast('Key deleted'); loadKeys(); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2500);
  }
</script>
</body>
</html>
