<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border-glow: #3b3b5e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --accent: #7c6af7;
    --accent-dim: #4a3fa0;
    --success: #22c55e;
    --error: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; fill: white; }

  .logo-text {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 0.4rem;
    color: var(--text);
    line-height: 1.3;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: var(--mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--accent); }

  .paste-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface);
    border: 1px solid var(--border-glow);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--mono);
    transition: color 0.2s, border-color 0.2s;
  }

  .paste-btn:hover { color: var(--text); border-color: var(--accent); }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 14px;
    color: white;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .submit-btn:hover { background: #6b5be0; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--accent-dim); cursor: not-allowed; opacity: 0.7; }

  .status {
    margin-top: 1rem;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
  }

  .status.success { display: flex; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); color: var(--success); }
  .status.error { display: flex; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: var(--error); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status.success .status-dot { background: var(--success); animation: pulse 1.5s infinite; }
  .status.error .status-dot { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .footer {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-text {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--success);
    font-family: var(--mono);
  }

  .indicator-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  .loading-spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93C9.33 17.79 7 14.5 7 11V7.18L12 5z"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">SecureAccess</div>
      <div class="logo-sub">Private Portal</div>
    </div>
  </div>

  <h1>Enter your access key</h1>
  <p class="subtitle">This is a private resource. Enter the key provided to you to gain access.</p>

  <label for="key-input">Access Key</label>
  <div class="input-wrap">
    <input type="text" id="key-input" placeholder="SK-XXXX-XXXX-XXXX-XXXX" spellcheck="false" autocomplete="off">
    <button class="paste-btn" onclick="pasteKey()">Paste</button>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="validateKey()">
    <span id="btn-text">Verify &amp; Enter</span>
    <div class="loading-spinner" id="spinner"></div>
  </button>

  <div class="status" id="status">
    <div class="status-dot"></div>
    <span id="status-msg"></span>
  </div>

  <div class="footer">
    <span class="footer-text">Contact admin for a key</span>
    <div class="indicator">
      <div class="indicator-dot"></div>
      System online
    </div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin;

  async function pasteKey() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('key-input').value = text.trim();
    } catch {
      document.getElementById('key-input').focus();
    }
  }

  document.getElementById('key-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') validateKey();
  });

  async function validateKey() {
    const key = document.getElementById('key-input').value.trim();
    const btn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('spinner');
    const statusEl = document.getElementById('status');
    const statusMsg = document.getElementById('status-msg');

    if (!key) {
      showStatus('error', 'Please enter your access key.');
      return;
    }

    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';
    statusEl.className = 'status';

    try {
      const res = await fetch(`${API_BASE}/api/validate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
      });

      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('auth_key', key);
        sessionStorage.setItem('auth_user', data.user);
        sessionStorage.setItem('auth_expires', data.expires_at || 'never');
        showStatus('success', `Welcome, ${data.user}! Redirecting...`);
        setTimeout(() => { window.location.href = '/protected.html'; }, 1200);
      } else {
        showStatus('error', data.error || 'Invalid key. Access denied.');
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    } catch (err) {
      showStatus('error', 'Server unreachable. Try again.');
      btn.disabled = false;
      btnText.style.display = 'block';
      spinner.style.display = 'none';
    }
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    const msgEl = document.getElementById('status-msg');
    el.className = `status ${type}`;
    msgEl.textContent = msg;
  }
</script>
</body>
</html>
